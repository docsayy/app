<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grocery App</title>
  <style>
    :root{
      --bg:#eef5f7;
      --card:#ffffff;
      --text:#27435a;
      --muted:#6c8294;
      --border:#d9e4ea;
      --blue:#2f73b7;
      --blue-dark:#245f98;
      --green:#2da44e;
      --green-dark:#23863f;
      --red:#b42318;
      --orange:#a15c12;
      --shadow:0 12px 30px rgba(35,55,80,.08);
      --radius:24px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:18px 16px 130px;
      min-height:100vh;
    }

    .hidden{display:none !important}

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .auth-card{
      max-width:520px;
      margin:40px auto 0;
      padding:26px;
    }

    .auth-title{
      margin:0 0 8px;
      text-align:center;
      letter-spacing:.08em;
      color:var(--text);
    }

    .auth-sub{
      text-align:center;
      color:var(--muted);
      margin:0 0 22px;
      font-size:14px;
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
      font-weight:700;
      letter-spacing:.04em;
    }

    .field input,
    .field select{
      width:100%;
      padding:14px 14px;
      border-radius:14px;
      border:2px solid #cfdbe3;
      outline:none;
      font-size:16px;
      background:#fff;
    }

    .field input:focus,
    .field select:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 4px rgba(47,115,183,.12);
    }

    .error-box{
      display:none;
      margin-bottom:14px;
      background:#fff2f0;
      color:var(--red);
      border:1px solid #f0c2bc;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
    }

    .btn{
      border:none;
      border-radius:16px;
      padding:13px 16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      transition:.18s ease;
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .btn-primary{
      background:var(--blue);
      color:#fff;
    }

    .btn-primary:hover{background:var(--blue-dark)}

    .btn-green{
      background:var(--green);
      color:#fff;
    }

    .btn-green:hover{background:var(--green-dark)}

    .btn-ghost{
      background:#f4f8fa;
      color:var(--text);
      border:1px solid var(--border);
    }

    .btn-danger{
      background:#fff2f0;
      color:var(--red);
      border:1px solid #f0c2bc;
    }

    .btn-small{
      padding:9px 12px;
      border-radius:12px;
      font-size:13px;
    }

    .auth-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:6px;
    }

    .auth-note{
      margin-top:14px;
      color:var(--muted);
      font-size:13px;
      line-height:1.4;
      text-align:center;
    }

    #appShell{display:none}

    .topbar{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:14px;
    }

    .status-pill{
      flex:1;
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px 16px;
      color:var(--muted);
      box-shadow:var(--shadow);
      min-height:52px;
      display:flex;
      align-items:center;
      font-size:14px;
    }

    .header-card{
      padding:10px;
      margin-bottom:14px;
      border-radius:18px;
    }

    .tabs{
      display:flex;
      gap:0;
      overflow-x:auto;
      border:1px solid var(--border);
      border-radius:14px;
      background:#f8fbfc;
    }

    .tab{
      white-space:nowrap;
      border:0;
      border-right:1px solid var(--border);
      background:#fff;
      color:var(--text);
      padding:13px 18px;
      border-radius:0;
      font-weight:900;
      cursor:pointer;
      min-width:110px;
    }

    .tab:first-child{
      border-top-left-radius:13px;
      border-bottom-left-radius:13px;
    }

    .tab.active{
      background:var(--blue);
      color:#fff;
    }

    .tab.add{
      background:#eaf4ec;
      color:#1f6d35;
      border-right:0;
    }

    .panel{
      padding:18px;
      margin-bottom:14px;
    }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .section-title{
      font-weight:900;
      letter-spacing:.08em;
      font-size:18px;
      color:#55748e;
    }

    .list{
      display:grid;
      gap:10px;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      padding:20px 10px;
      border:1px dashed var(--border);
      border-radius:18px;
      background:#fbfdfe;
    }

    .item{
      border:1px solid var(--border);
      border-radius:18px;
      padding:12px;
      background:#fbfdfe;
    }

    .item.checked{
      background:#f0fbf3;
      border-color:#b8dec3;
    }

    .item-top{
      display:grid;
      grid-template-columns:46px 1fr;
      gap:12px;
      align-items:start;
    }

    .item-main{
      min-width:0;
    }

    .item-name{
      font-weight:900;
      font-size:16px;
      word-break:break-word;
    }

    .item-meta{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
      line-height:1.45;
    }

    .check-btn{
      min-width:42px;
      height:42px;
      border-radius:14px;
      border:2px solid #b8c9d5;
      background:#fff;
      font-size:20px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }

    .check-btn.checked{
      background:#e8f4ec;
      border-color:#7cc28e;
    }

    .item-edit-row{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:8px;
      margin-top:10px;
      max-width:360px;
    }

    .mini-field label{
      display:block;
      font-size:10px;
      font-weight:900;
      color:var(--muted);
      letter-spacing:.08em;
      margin-bottom:4px;
    }

    .mini-field input{
      width:100%;
      border:1px solid var(--border);
      border-radius:12px;
      padding:9px 10px;
      font-size:14px;
      background:#fff;
      outline:none;
    }

    .mini-field input:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(47,115,183,.12);
    }

    .item-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .chip{
      font-size:12px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      cursor:pointer;
      font-weight:800;
      color:var(--text);
    }

    .chip.saved{
      background:#f8f1e8;
      color:var(--orange);
      border-color:#ead2b8;
    }

    .chip.delete{
      background:#fff2f0;
      color:var(--red);
      border-color:#f0c2bc;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:14px;
    }

    .summary-box{
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      padding:12px;
    }

    .summary-label{
      font-size:11px;
      font-weight:900;
      color:var(--muted);
      letter-spacing:.1em;
    }

    .summary-value{
      font-size:20px;
      font-weight:900;
      color:#7e173f;
      margin-top:3px;
    }

    .history-item{
      border:1px solid var(--border);
      background:#fbfdfe;
      border-radius:18px;
      padding:12px;
    }

    .history-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-weight:900;
    }

    .history-meta{
      color:var(--muted);
      font-size:13px;
      margin-top:5px;
    }

    .history-details{
      margin-top:10px;
      font-size:13px;
      color:var(--text);
      line-height:1.5;
    }

    .account-box{
      padding:14px 16px;
      color:var(--muted);
      font-size:13px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(20,35,50,.38);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:50;
    }

    .modal-card{
      width:100%;
      max-width:460px;
      background:#fff;
      border-radius:24px;
      padding:22px;
      box-shadow:0 20px 60px rgba(20,35,50,.25);
      max-height:90vh;
      overflow:auto;
    }

    .modal-card h2{
      margin:0 0 18px;
      text-align:center;
      color:var(--text);
    }

    .modal-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:8px;
    }

    .bottom-bar{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:rgba(238,245,247,.96);
      backdrop-filter:blur(10px);
      border-top:1px solid var(--border);
      padding:12px 14px;
      z-index:20;
    }

    .bottom-inner{
      max-width:900px;
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:10px;
      align-items:center;
    }

    .total-box{
      background:#fff;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      border-radius:18px;
      padding:10px 14px;
    }

    .total-label{
      font-size:11px;
      font-weight:900;
      letter-spacing:.1em;
      color:#7e4b65;
    }

    .total-value{
      font-size:18px;
      font-weight:900;
      color:#7e173f;
    }


    .suggestions{
      margin-top:8px;
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
      background:#fff;
    }

    .suggestion{
      padding:11px 12px;
      cursor:pointer;
      border-bottom:1px solid var(--border);
      font-size:14px;
    }

    .suggestion:last-child{border-bottom:0}

    .suggestion:hover{background:#f4f8fa}

    .suggestion strong{color:var(--text)}

    .suggestion span{
      display:block;
      margin-top:3px;
      color:var(--muted);
      font-size:12px;
    }

    .check-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    @media (max-width:700px){
      .auth-actions,
      .modal-actions,
      .summary-grid{
        grid-template-columns:1fr;
      }

      .bottom-inner{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="authScreen" class="card auth-card">
      <h1 class="auth-title">GROCERY APP</h1>
      <p class="auth-sub">Sign in with email and password to open your grocery list.</p>

      <div id="authError" class="error-box"></div>

      <div class="field">
        <label for="emailInput">EMAIL</label>
        <input id="emailInput" type="email" placeholder="you@example.com" autocomplete="username" />
      </div>

      <div class="field">
        <label for="passwordInput">PASSWORD</label>
        <input id="passwordInput" type="password" placeholder="Enter password" autocomplete="current-password" />
      </div>

      <div class="auth-actions">
        <button id="signInBtn" class="btn btn-primary">Sign In</button>
        <button id="createAccountBtn" class="btn btn-ghost">Create Account</button>
      </div>

      <p class="auth-note">
        First time? Use <b>Create Account</b> once, then later use <b>Sign In</b>.
      </p>
    </div>

    <div id="appShell">
      <div class="card header-card">
        <div id="storeTabs" class="tabs"></div>
      </div>

      <div class="summary-grid">
        <div class="summary-box">
          <div class="summary-label">CURRENT STORE</div>
          <div id="currentStoreLabel" class="summary-value">Costco</div>
        </div>
        <div class="summary-box">
          <div class="summary-label">PICKED TOTAL</div>
          <div id="pickedTotal" class="summary-value">$0.00</div>
        </div>
      </div>

      <div class="card panel">
        <div class="section-head">
          <div class="section-title">HAVE TO GET</div>
          <button id="finishShoppingTopBtn" class="btn btn-green btn-small">Finish Shopping</button>
        </div>
        <div id="needList" class="list"></div>
      </div>

      <div class="card panel">
        <div class="section-head">
          <div class="section-title">GOT</div>
          <div id="gotCount" style="color:var(--muted);font-weight:800;">0 items</div>
        </div>
        <div id="gotList" class="list"></div>
      </div>

      <div class="card panel">
        <div class="section-head">
          <div>
            <div class="section-title">SAVED ITEMS</div>
            <div id="savedCount" style="color:var(--muted);font-size:13px;margin-top:3px;">0 items</div>
          </div>
          <button id="toggleSavedBtn" class="btn btn-ghost btn-small">Show / Hide</button>
        </div>
        <div id="savedWrap" class="hidden">
          <div id="savedList" class="list"></div>
        </div>
      </div>

      <div class="card panel">
        <div class="section-head">
          <div>
            <div class="section-title">FUTURE LIST</div>
            <div id="futureCount" style="color:var(--muted);font-size:13px;margin-top:3px;">0 items</div>
          </div>
          <button id="toggleFutureBtn" class="btn btn-ghost btn-small">Show / Hide</button>
        </div>
        <div id="futureWrap" class="hidden">
          <div id="futureList" class="list"></div>
        </div>
      </div>

      <div class="card panel">
        <div class="section-head">
          <div class="section-title">SHOPPING HISTORY</div>
          <button id="toggleHistoryBtn" class="btn btn-ghost btn-small">Show / Hide</button>
        </div>
        <div id="historyWrap" class="hidden">
          <div id="historyList" class="list"></div>
        </div>
      </div>

      <div class="card account-box">
        <div id="accountText">Account</div>
        <button id="signOutBtn" class="btn btn-ghost btn-small">Sign Out</button>
      </div>
    </div>
  </div>

  <div id="bottomBar" class="bottom-bar hidden">
    <div class="bottom-inner">
      <div class="total-box">
        <div class="total-label">PICKED TOTAL</div>
        <div id="pickedTotalBottom" class="total-value">$0.00</div>
      </div>
      <button id="bottomAddBtn" class="btn btn-green">+ Add Item</button>
      <button id="finishShoppingBtn" class="btn btn-primary">Finish Shopping</button>
    </div>
  </div>

  <div id="addModal" class="modal hidden">
    <div class="modal-card">
      <h2>Add Item</h2>

      <div class="field">
        <label for="itemNameInput">ITEM NAME</label>
        <input id="itemNameInput" type="text" placeholder="Milk, eggs, rice..." />
        <div id="suggestionsBox" class="suggestions hidden"></div>
      </div>

      <div class="field">
        <label for="itemQtyInput">NUMBER NEEDED</label>
        <input id="itemQtyInput" type="number" min="1" value="1" />
      </div>

      <div class="field">
        <label for="itemPriceInput">PRICE OPTIONAL</label>
        <input id="itemPriceInput" type="text" placeholder="Optional now, can add in store" />
      </div>

      <div class="field">
        <label for="itemStoreInput">STORE</label>
        <select id="itemStoreInput"></select>
      </div>

      <div class="modal-actions">
        <button id="saveModalItemBtn" class="btn btn-green">Save Item</button>
        <button id="closeModalBtn" class="btn btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      updateDoc,
      deleteDoc,
      doc,
      query,
      orderBy,
      serverTimestamp,
      writeBatch
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCKjRp3Cznv-kpLmV_jTMWPLbxholG8_t0",
      authDomain: "grocery-tracker-ac17b.firebaseapp.com",
      projectId: "grocery-tracker-ac17b",
      storageBucket: "grocery-tracker-ac17b.firebasestorage.app",
      messagingSenderId: "1093457578265",
      appId: "1:1093457578265:web:f4a65515ce8d671a1f1d88"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const DEFAULT_STORES = ["Costco", "ShopRite"];

    const authScreen = document.getElementById("authScreen");
    const appShell = document.getElementById("appShell");
    const bottomBar = document.getElementById("bottomBar");
    const accountText = document.getElementById("accountText");
    const authError = document.getElementById("authError");

    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const signInBtn = document.getElementById("signInBtn");
    const createAccountBtn = document.getElementById("createAccountBtn");
    const signOutBtn = document.getElementById("signOutBtn");

    const storeTabs = document.getElementById("storeTabs");
    const currentStoreLabel = document.getElementById("currentStoreLabel");

    const needList = document.getElementById("needList");
    const gotList = document.getElementById("gotList");
    const savedList = document.getElementById("savedList");
    const futureList = document.getElementById("futureList");
    const historyList = document.getElementById("historyList");

    const savedWrap = document.getElementById("savedWrap");
    const futureWrap = document.getElementById("futureWrap");
    const historyWrap = document.getElementById("historyWrap");
    const toggleSavedBtn = document.getElementById("toggleSavedBtn");
    const toggleFutureBtn = document.getElementById("toggleFutureBtn");
    const toggleHistoryBtn = document.getElementById("toggleHistoryBtn");

    const savedCount = document.getElementById("savedCount");
    const futureCount = document.getElementById("futureCount");
    const gotCount = document.getElementById("gotCount");
    const pickedTotal = document.getElementById("pickedTotal");
    const pickedTotalBottom = document.getElementById("pickedTotalBottom");

    const bottomAddBtn = document.getElementById("bottomAddBtn");
    const finishShoppingBtn = document.getElementById("finishShoppingBtn");
    const finishShoppingTopBtn = document.getElementById("finishShoppingTopBtn");

    const addModal = document.getElementById("addModal");
    const itemNameInput = document.getElementById("itemNameInput");
    const itemQtyInput = document.getElementById("itemQtyInput");
    const itemPriceInput = document.getElementById("itemPriceInput");
    const itemStoreInput = document.getElementById("itemStoreInput");
    const suggestionsBox = document.getElementById("suggestionsBox");
    const saveModalItemBtn = document.getElementById("saveModalItemBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");

    let currentUser = null;
    let currentItems = [];
    let receipts = [];
    let stores = [...DEFAULT_STORES];
    let selectedStore = "Costco";
    let editingItemId = null;
    let unsubscribeItems = null;
    let unsubscribeReceipts = null;

    function showError(message) {
      authError.textContent = message;
      authError.style.display = "block";
    }

    function clearError() {
      authError.textContent = "";
      authError.style.display = "none";
    }

    function setAuthLoading(loading) {
      signInBtn.disabled = loading;
      createAccountBtn.disabled = loading;
      signInBtn.textContent = loading ? "Please wait..." : "Sign In";
      createAccountBtn.textContent = loading ? "Please wait..." : "Create Account";
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function money(value) {
      return `$${Number(value || 0).toFixed(2)}`;
    }

    function parsePriceNumber(priceText) {
      if (!priceText) return 0;
      const cleaned = String(priceText).trim();

      const forMatch = cleaned.match(/^(\d+(\.\d+)?)\s*(for|\/)\s*(\d+(\.\d+)?)$/i);
      if (forMatch) {
        const total = parseFloat(forMatch[1]);
        return isNaN(total) ? 0 : total;
      }

      const numberMatch = cleaned.match(/(\d+(\.\d+)?)/);
      if (!numberMatch) return 0;

      const value = parseFloat(numberMatch[1]);
      return isNaN(value) ? 0 : value;
    }

    function itemTotal(item) {
      return parsePriceNumber(item.price) * (Number(item.quantity) || 1);
    }

    function normalizeStoreName(name) {
      return String(name || "").trim();
    }

    function openAddModal(sourceItem = null) {
      editingItemId = sourceItem?.id || null;
      itemNameInput.value = sourceItem?.name || "";
      itemQtyInput.value = sourceItem?.quantity || "1";
      itemPriceInput.value = sourceItem?.price || "";
      itemStoreInput.value = sourceItem?.store || selectedStore;
      suggestionsBox.classList.add("hidden");
      addModal.classList.remove("hidden");
      setTimeout(() => itemNameInput.focus(), 50);
    }

    function closeAddModal() {
      addModal.classList.add("hidden");
      editingItemId = null;
      suggestionsBox.classList.add("hidden");
    }

    async function handleSignIn() {
      clearError();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        showError("Enter email and password.");
        return;
      }

      try {
        setAuthLoading(true);
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        showError(err.message);
        console.error(err);
      } finally {
        setAuthLoading(false);
      }
    }

    async function handleCreateAccount() {
      clearError();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        showError("Enter email and password.");
        return;
      }

      if (password.length < 6) {
        showError("Password should be at least 6 characters.");
        return;
      }

      try {
        setAuthLoading(true);
        await createUserWithEmailAndPassword(auth, email, password);
      } catch (err) {
        showError(err.message);
        console.error(err);
      } finally {
        setAuthLoading(false);
      }
    }

    async function handleSignOut() {
      try {
        await signOut(auth);
      } catch (err) {
        alert(err.message);
        console.error(err);
      }
    }

    function renderStoreTabs() {
      const itemStores = currentItems.map(i => i.store).filter(Boolean);
      const receiptStores = receipts.map(r => r.store).filter(Boolean);
      stores = Array.from(new Set([...DEFAULT_STORES, ...stores, ...itemStores, ...receiptStores]));

      if (!stores.includes(selectedStore)) selectedStore = stores[0] || "Costco";

      storeTabs.innerHTML = "";

      stores.forEach(store => {
        const btn = document.createElement("button");
        btn.className = `tab ${store === selectedStore ? "active" : ""}`;
        btn.textContent = store;
        btn.addEventListener("click", () => {
          selectedStore = store;
          renderAll();
        });
        storeTabs.appendChild(btn);
      });

      const addBtn = document.createElement("button");
      addBtn.className = "tab add";
      addBtn.textContent = "+ Add Store";
      addBtn.addEventListener("click", () => {
        const storeName = normalizeStoreName(prompt("New store name:"));
        if (!storeName) return;
        stores.push(storeName);
        selectedStore = storeName;
        renderAll();
      });
      storeTabs.appendChild(addBtn);

      itemStoreInput.innerHTML = "";
      stores.forEach(store => {
        const opt = document.createElement("option");
        opt.value = store;
        opt.textContent = store;
        itemStoreInput.appendChild(opt);
      });

      currentStoreLabel.textContent = selectedStore;
    }

    function renderAll() {
      renderStoreTabs();
      renderItems();
      renderHistory();
    }

    function renderItems() {
      needList.innerHTML = "";
      gotList.innerHTML = "";
      savedList.innerHTML = "";
      futureList.innerHTML = "";

      const visibleItems = currentItems.filter(i => (i.store || "Costco") === selectedStore);
      const need = visibleItems.filter(i => i.status === "need");
      const got = visibleItems.filter(i => i.status === "got");
      const saved = visibleItems.filter(i => i.status === "saved");
      const future = visibleItems.filter(i => i.status === "future");

      if (!need.length) {
        needList.innerHTML = `<div class="empty">No items to buy for ${escapeHtml(selectedStore)}.</div>`;
      } else {
        need.forEach(item => needList.appendChild(buildItemCard(item)));
      }

      if (!got.length) {
        gotList.innerHTML = `<div class="empty">No picked items yet.</div>`;
      } else {
        got.forEach(item => gotList.appendChild(buildItemCard(item)));
      }

      if (!saved.length) {
        savedList.innerHTML = `<div class="empty">No saved items for ${escapeHtml(selectedStore)}.</div>`;
      } else {
        saved.forEach(item => savedList.appendChild(buildItemCard(item)));
      }

      if (!future.length) {
        futureList.innerHTML = `<div class="empty">No future items for ${escapeHtml(selectedStore)}.</div>`;
      } else {
        future.forEach(item => futureList.appendChild(buildItemCard(item)));
      }

      const total = got.reduce((sum, item) => sum + itemTotal(item), 0);
      pickedTotal.textContent = money(total);
      pickedTotalBottom.textContent = money(total);
      gotCount.textContent = `${got.length} item${got.length === 1 ? "" : "s"}`;
      savedCount.textContent = `${saved.length} item${saved.length === 1 ? "" : "s"}`;
      futureCount.textContent = `${future.length} item${future.length === 1 ? "" : "s"}`;
    }

    function buildItemCard(item) {
      const div = document.createElement("div");
      div.className = `item ${item.status === "got" ? "checked" : ""}`;

      const total = itemTotal(item);
      const isSaved = item.status === "saved";
      const isFuture = item.status === "future";
      const canEdit = !isSaved;

      let actions = "";
      if (isSaved) {
        actions = `
          <button class="chip" data-action="addSaved">Add to List</button>
          <button class="chip delete" data-action="delete">Delete</button>
        `;
      } else if (isFuture) {
        actions = `
          <button class="chip" data-action="need">Add to Have to Get</button>
          <button class="chip saved" data-action="saved">Move to Saved</button>
          <button class="chip delete" data-action="delete">Delete</button>
        `;
      } else {
        actions = `
          <button class="chip saved" data-action="saved">Save for Later</button>
          <button class="chip" data-action="future">Future List</button>
          <button class="chip delete" data-action="delete">Delete</button>
        `;
      }

      const checkAction = item.status === "got" ? "need" : "got";
      const checkDisabled = isSaved || isFuture;

      const editFields = canEdit ? `
        <div class="item-edit-row">
          <div class="mini-field">
            <label>QTY</label>
            <input class="inline-qty" type="number" min="1" value="${item.quantity || 1}" />
          </div>
          <div class="mini-field">
            <label>PRICE</label>
            <input class="inline-price" type="text" value="${escapeHtml(item.price || "")}" placeholder="Add price in store" />
          </div>
        </div>
      ` : "";

      div.innerHTML = `
        <div class="item-top">
          <button class="check-btn ${item.status === "got" ? "checked" : ""}" ${checkDisabled ? "disabled" : ""} data-action="${checkAction}">
            ${item.status === "got" ? "✓" : ""}
          </button>
          <div class="item-main">
            <div class="item-name">${escapeHtml(item.name || "Untitled item")} × ${item.quantity || 1}</div>
            <div class="item-meta">
              ${item.price ? `Price: ${escapeHtml(item.price)}` : "Price not added yet"}
              ${total ? ` • Total: ${money(total)}` : ""}
              ${item.store ? ` • Store: ${escapeHtml(item.store)}` : ""}
            </div>
            ${editFields}
          </div>
        </div>
        <div class="item-actions">${actions}</div>
      `;

      const qtyInput = div.querySelector(".inline-qty");
      const priceInput = div.querySelector(".inline-price");

      async function saveInlineEdits() {
        if (!qtyInput || !priceInput) return;

        const quantity = parseInt(qtyInput.value, 10) || 1;
        const price = priceInput.value.trim();

        try {
          const ref = doc(db, "groceryItems", item.id);
          await updateDoc(ref, { quantity, price });
        } catch (err) {
          alert(err.message);
          console.error(err);
        }
      }

      qtyInput?.addEventListener("change", saveInlineEdits);
      priceInput?.addEventListener("change", saveInlineEdits);
      priceInput?.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          priceInput.blur();
        }
      });

      div.querySelectorAll("[data-action]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const action = btn.dataset.action;
          const ref = doc(db, "groceryItems", item.id);

          try {
            if (action === "delete") {
              if (!confirm(`Delete ${item.name}?`)) return;
              await deleteDoc(ref);
            } else if (action === "addSaved") {
              openAddModal(item);
            } else {
              await updateDoc(ref, { status: action });
            }
          } catch (err) {
            alert(err.message);
            console.error(err);
          }
        });
      });

      return div;
    }

    async function handleAddItem() {
      if (!currentUser) {
        alert("Please sign in first.");
        return;
      }

      const name = itemNameInput.value.trim();
      const quantity = parseInt(itemQtyInput.value, 10) || 1;
      const price = itemPriceInput.value.trim();
      const store = itemStoreInput.value || selectedStore;

      if (!name) {
        alert("Enter an item name.");
        itemNameInput.focus();
        return;
      }

      try {
        if (editingItemId) {
          const ref = doc(db, "groceryItems", editingItemId);
          await updateDoc(ref, {
            name,
            quantity,
            price,
            store,
            status: "need"
          });
        } else {
          const sameActive = currentItems.find(i =>
            (i.store || "Costco") === store &&
            ["need", "got"].includes(i.status) &&
            String(i.name || "").toLowerCase() === name.toLowerCase()
          );

          if (sameActive) {
            const ok = confirm(`${name} is already on the current list for ${store}. Update quantity/price instead?`);
            if (ok) {
              const ref = doc(db, "groceryItems", sameActive.id);
              await updateDoc(ref, {
                quantity,
                price,
                status: "need"
              });
            } else {
              return;
            }
          } else {
            await addDoc(collection(db, "groceryItems"), {
              name,
              quantity,
              price,
              store,
              status: "need",
              createdBy: currentUser.email || currentUser.uid,
              createdAt: serverTimestamp()
            });
          }
        }

        selectedStore = store;
        closeAddModal();
      } catch (err) {
        alert(err.message);
        console.error(err);
      }
    }

    async function finishShopping() {
      if (!currentUser) {
        alert("Please sign in first.");
        return;
      }

      const gotItems = currentItems.filter(i => (i.store || "Costco") === selectedStore && i.status === "got");

      if (!gotItems.length) {
        alert("No checked items to save for this store.");
        return;
      }

      const total = gotItems.reduce((sum, item) => sum + itemTotal(item), 0);

      const ok = confirm(`Save receipt for ${selectedStore} with ${gotItems.length} item(s), total ${money(total)}?`);
      if (!ok) return;

      try {
        await addDoc(collection(db, "receipts"), {
          store: selectedStore,
          total,
          itemCount: gotItems.length,
          items: gotItems.map(item => ({
            name: item.name || "",
            quantity: item.quantity || 1,
            price: item.price || "",
            total: itemTotal(item)
          })),
          createdBy: currentUser.email || currentUser.uid,
          createdAt: serverTimestamp(),
          createdAtText: new Date().toISOString()
        });

        const batch = writeBatch(db);
        gotItems.forEach(item => {
          const ref = doc(db, "groceryItems", item.id);
          batch.update(ref, { status: "saved" });
        });
        await batch.commit();

        alert("Shopping receipt saved. Picked items moved to Saved.");
      } catch (err) {
        alert(err.message);
        console.error(err);
      }
    }

    function renderHistory() {
      historyList.innerHTML = "";

      const filtered = receipts.filter(r => (r.store || "Costco") === selectedStore);

      if (!filtered.length) {
        historyList.innerHTML = `<div class="empty">No shopping history for ${escapeHtml(selectedStore)} yet.</div>`;
        return;
      }

      filtered.forEach(receipt => {
        const div = document.createElement("div");
        div.className = "history-item";

        const date = receipt.createdAt?.toDate
          ? receipt.createdAt.toDate()
          : receipt.createdAtText
            ? new Date(receipt.createdAtText)
            : null;

        const dateText = date && !isNaN(date)
          ? date.toLocaleString([], { month:"short", day:"numeric", year:"numeric", hour:"numeric", minute:"2-digit" })
          : "Saved receipt";

        const itemLines = (receipt.items || [])
          .map(i => `${escapeHtml(i.name)} × ${i.quantity || 1} — ${i.price ? escapeHtml(i.price) : "no price"}${i.total ? ` (${money(i.total)})` : ""}`)
          .join("<br>");

        div.innerHTML = `
          <div class="history-top">
            <div>${escapeHtml(receipt.store || selectedStore)}</div>
            <div>${money(receipt.total || 0)}</div>
          </div>
          <div class="history-meta">${dateText} • ${receipt.itemCount || (receipt.items || []).length} item(s)</div>
          <div class="history-details">${itemLines || "No item details."}</div>
        `;

        historyList.appendChild(div);
      });
    }

    function watchItems() {
      if (unsubscribeItems) unsubscribeItems();

      const q = query(collection(db, "groceryItems"), orderBy("createdAt", "desc"));
      unsubscribeItems = onSnapshot(q, (snap) => {
        currentItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderAll();
      }, (err) => {
        console.error(err);
        alert("Could not load grocery items. Check Firestore rules.");
      });
    }

    function watchReceipts() {
      if (unsubscribeReceipts) unsubscribeReceipts();

      const q = query(collection(db, "receipts"), orderBy("createdAt", "desc"));
      unsubscribeReceipts = onSnapshot(q, (snap) => {
        receipts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderAll();
      }, (err) => {
        console.error(err);
        alert("Could not load shopping history. Check Firestore rules for receipts.");
      });
    }

    function getSuggestionPool() {
      const map = new Map();

      currentItems.forEach(item => {
        if (!item.name) return;
        const key = `${item.name.toLowerCase()}__${item.store || "Costco"}`;
        map.set(key, {
          name: item.name,
          quantity: item.quantity || 1,
          price: item.price || "",
          store: item.store || selectedStore,
          source: item.status === "saved" ? "Saved" : item.status === "future" ? "Future" : "Current"
        });
      });

      receipts.forEach(receipt => {
        (receipt.items || []).forEach(item => {
          if (!item.name) return;
          const store = receipt.store || selectedStore;
          const key = `${item.name.toLowerCase()}__${store}`;
          if (!map.has(key)) {
            map.set(key, {
              name: item.name,
              quantity: item.quantity || 1,
              price: item.price || "",
              store,
              source: "History"
            });
          }
        });
      });

      return Array.from(map.values());
    }

    function renderSuggestions() {
      const text = itemNameInput.value.trim().toLowerCase();

      if (!text || text.length < 2) {
        suggestionsBox.classList.add("hidden");
        suggestionsBox.innerHTML = "";
        return;
      }

      const matches = getSuggestionPool()
        .filter(item => item.name.toLowerCase().includes(text))
        .slice(0, 6);

      if (!matches.length) {
        suggestionsBox.classList.add("hidden");
        suggestionsBox.innerHTML = "";
        return;
      }

      suggestionsBox.innerHTML = "";
      matches.forEach(item => {
        const div = document.createElement("div");
        div.className = "suggestion";
        div.innerHTML = `
          <strong>${escapeHtml(item.name)}</strong>
          <span>${escapeHtml(item.store)} • ${item.price ? escapeHtml(item.price) : "no price"} • from ${escapeHtml(item.source)}</span>
        `;
        div.addEventListener("click", () => {
          itemNameInput.value = item.name;
          itemQtyInput.value = item.quantity || 1;
          itemPriceInput.value = item.price || "";
          itemStoreInput.value = item.store || selectedStore;
          suggestionsBox.classList.add("hidden");
        });
        suggestionsBox.appendChild(div);
      });

      suggestionsBox.classList.remove("hidden");
    }


    signInBtn.addEventListener("click", handleSignIn);
    createAccountBtn.addEventListener("click", handleCreateAccount);
    signOutBtn.addEventListener("click", handleSignOut);

    bottomAddBtn.addEventListener("click", openAddModal);
    saveModalItemBtn.addEventListener("click", handleAddItem);
    closeModalBtn.addEventListener("click", closeAddModal);

    finishShoppingBtn.addEventListener("click", finishShopping);
    finishShoppingTopBtn.addEventListener("click", finishShopping);

    toggleSavedBtn.addEventListener("click", () => savedWrap.classList.toggle("hidden"));
    toggleFutureBtn.addEventListener("click", () => futureWrap.classList.toggle("hidden"));
    toggleHistoryBtn.addEventListener("click", () => historyWrap.classList.toggle("hidden"));

    itemNameInput.addEventListener("input", renderSuggestions);

    addModal.addEventListener("click", (e) => {
      if (e.target === addModal) closeAddModal();
    });

    [emailInput, passwordInput].forEach(el => {
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleSignIn();
      });
    });

    [itemNameInput, itemQtyInput, itemPriceInput].forEach(el => {
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleAddItem();
      });
    });

    onAuthStateChanged(auth, (user) => {
      currentUser = user;

      if (user) {
        authScreen.style.display = "none";
        appShell.style.display = "block";
        bottomBar.classList.remove("hidden");
        accountText.textContent = `Account: ${user.email}`;
        watchItems();
        watchReceipts();
      } else {
        authScreen.style.display = "block";
        appShell.style.display = "none";
        bottomBar.classList.add("hidden");
        currentItems = [];
        receipts = [];
        renderAll();

        if (unsubscribeItems) {
          unsubscribeItems();
          unsubscribeItems = null;
        }

        if (unsubscribeReceipts) {
          unsubscribeReceipts();
          unsubscribeReceipts = null;
        }
      }
    });
  </script>
</body>
</html>

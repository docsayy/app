<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grocery App</title>
  <style>
    :root{
      --bg:#eef5f7;
      --card:#ffffff;
      --text:#27435a;
      --muted:#6c8294;
      --border:#d9e4ea;
      --blue:#2f73b7;
      --green:#2da44e;
      --green-dark:#23863f;
      --red:#b42318;
      --shadow:0 12px 30px rgba(35,55,80,.08);
      --radius:24px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:18px 16px 110px;
      min-height:100vh;
    }

    .topbar{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
    }

    .status-pill{
      flex:1;
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px 18px;
      color:var(--muted);
      box-shadow:var(--shadow);
      min-height:56px;
      display:flex;
      align-items:center;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .auth-card{
      max-width:520px;
      margin:40px auto 0;
      padding:26px;
    }

    .auth-title{
      margin:0 0 8px;
      text-align:center;
      letter-spacing:.08em;
      color:var(--text);
    }

    .auth-sub{
      text-align:center;
      color:var(--muted);
      margin:0 0 22px;
      font-size:14px;
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
      font-weight:700;
      letter-spacing:.04em;
    }

    .field input{
      width:100%;
      padding:14px 14px;
      border-radius:14px;
      border:2px solid #cfdbe3;
      outline:none;
      font-size:16px;
      background:#fff;
    }

    .field input:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 4px rgba(47,115,183,.12);
    }

    .btn{
      border:none;
      border-radius:16px;
      padding:14px 18px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:.18s ease;
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .btn-primary{
      background:var(--blue);
      color:#fff;
    }

    .btn-primary:hover{filter:brightness(.98)}

    .btn-green{
      background:var(--green);
      color:#fff;
    }

    .btn-green:hover{background:var(--green-dark)}

    .btn-ghost{
      background:#f4f8fa;
      color:var(--text);
      border:1px solid var(--border);
    }

    .btn-small{
      padding:10px 14px;
      border-radius:12px;
      font-size:14px;
    }

    .auth-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:6px;
    }

    .auth-note{
      margin-top:14px;
      color:var(--muted);
      font-size:13px;
      line-height:1.4;
      text-align:center;
    }

    .error-box{
      display:none;
      margin-bottom:14px;
      background:#fff2f0;
      color:var(--red);
      border:1px solid #f0c2bc;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
    }

    #appShell{display:none}

    .lists{
      display:grid;
      gap:16px;
      margin-top:10px;
    }

    .panel{
      padding:20px;
    }

    .section-title{
      text-align:center;
      font-weight:800;
      letter-spacing:.09em;
      font-size:22px;
      margin:8px 0 18px;
      color:#55748e;
    }

    .list{
      display:grid;
      gap:10px;
      margin-top:10px;
    }

    .item{
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
      background:#fbfdfe;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }

    .item-name{
      font-weight:700;
      font-size:16px;
    }

    .item-meta{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
    }

    .item-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .chip{
      font-size:12px;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      cursor:pointer;
      font-weight:700;
    }

    .chip.active{
      background:#e8f4ec;
      border-color:#b8dec3;
      color:#1f6d35;
    }

    .saved-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      cursor:pointer;
      user-select:none;
    }

    .saved-title{
      font-size:16px;
      font-weight:800;
      letter-spacing:.06em;
      color:#55748e;
    }

    .count{
      color:var(--muted);
      font-weight:700;
    }

    .hidden{display:none !important}

    .empty{
      text-align:center;
      color:var(--muted);
      padding:20px 10px;
    }

    .bottom-bar{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:rgba(238,245,247,.95);
      backdrop-filter:blur(10px);
      border-top:1px solid var(--border);
      padding:12px 14px;
    }

    .bottom-inner{
      max-width:860px;
      margin:0 auto;
      display:flex;
      gap:12px;
      justify-content:space-between;
      align-items:center;
    }

    .total-box{
      background:#fff;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      border-radius:18px;
      padding:12px 16px;
      min-width:180px;
    }

    .total-label{
      font-size:12px;
      font-weight:800;
      letter-spacing:.12em;
      color:#7e4b65;
    }

    .total-value{
      font-size:18px;
      font-weight:800;
      color:#7e173f;
    }

    .account-row{
      margin-top:14px;
      display:flex;
      justify-content:flex-end;
      gap:8px;
      flex-wrap:wrap;
    }

    .account-box{
      margin-top:18px;
      padding:14px 16px;
      border-top:1px solid var(--border);
      color:var(--muted);
      font-size:13px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .inline-form{
      display:grid;
      grid-template-columns:1.3fr .8fr .8fr;
      gap:10px;
      margin-top:16px;
    }

    .inline-form input{
      width:100%;
      padding:13px 12px;
      border-radius:14px;
      border:2px solid #cfdbe3;
      outline:none;
      font-size:15px;
      background:#fff;
    }

    .inline-form input:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 4px rgba(47,115,183,.12);
    }

    @media (max-width:700px){
      .auth-actions,
      .inline-form{
        grid-template-columns:1fr;
      }

      .bottom-inner{
        align-items:stretch;
      }

      .total-box{min-width:unset}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="authScreen" class="card auth-card">
      <h1 class="auth-title">GROCERY APP</h1>
      <p class="auth-sub">Sign in with email and password to open your shared grocery list.</p>

      <div id="authError" class="error-box"></div>

      <div class="field">
        <label for="emailInput">EMAIL</label>
        <input id="emailInput" type="email" placeholder="you@example.com" autocomplete="username" />
      </div>

      <div class="field">
        <label for="passwordInput">PASSWORD</label>
        <input id="passwordInput" type="password" placeholder="Enter password" autocomplete="current-password" />
      </div>

      <div class="auth-actions">
        <button id="signInBtn" class="btn btn-primary">Sign In</button>
        <button id="createAccountBtn" class="btn btn-ghost">Create Account</button>
      </div>

      <p class="auth-note">
        First time? Use <b>Create Account</b> once, then later just sign in normally.
      </p>
    </div>

    <div id="appShell">
      <div class="topbar">
        <div id="authStatus" class="status-pill">Signed in</div>
      </div>

      <div class="lists">
        <div class="card panel">
          <div class="section-title">HAVE TO GET</div>

          <div class="inline-form">
            <input id="itemNameInput" type="text" placeholder="Item name" />
            <input id="itemPriceInput" type="text" placeholder="Price e.g. 3.99 or 9.99/2" />
            <input id="itemStoreInput" type="text" placeholder="Store" />
          </div>

          <div class="account-row" style="justify-content:flex-start; margin-top:12px;">
            <button id="quickAddBtn" class="btn btn-green btn-small">Add Item</button>
          </div>

          <div id="needList" class="list"></div>

          <div class="section-title" style="margin-top:28px;">GOT</div>
          <div id="gotList" class="list"></div>

          <div class="account-box">
            <div>
              <strong>SAVED</strong>
              <span id="savedCount" class="count">0 items</span>
            </div>
            <button id="toggleSavedBtn" class="btn btn-ghost btn-small">Show / Hide</button>
          </div>

          <div id="savedWrap" class="hidden">
            <div id="savedList" class="list" style="margin-top:14px;"></div>
          </div>
        </div>
      </div>

      <div class="account-row">
        <button id="signOutBtn" class="btn btn-ghost btn-small">Sign Out</button>
      </div>
    </div>
  </div>

  <div id="bottomBar" class="bottom-bar hidden">
    <div class="bottom-inner">
      <div class="total-box">
        <div class="total-label">PICKED TOTAL</div>
        <div id="pickedTotal" class="total-value">$0.00</div>
      </div>

      <button id="bottomAddBtn" class="btn btn-green">+ Add Item</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      updateDoc,
      deleteDoc,
      doc,
      query,
      orderBy,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCKjRp3Cznv-kpLmV_jTMWPLbxholG8_t0",
      authDomain: "grocery-tracker-ac17b.firebaseapp.com",
      projectId: "grocery-tracker-ac17b",
      storageBucket: "grocery-tracker-ac17b.firebasestorage.app",
      messagingSenderId: "1093457578265",
      appId: "1:1093457578265:web:f4a65515ce8d671a1f1d88"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const authScreen = document.getElementById("authScreen");
    const appShell = document.getElementById("appShell");
    const bottomBar = document.getElementById("bottomBar");
    const authStatus = document.getElementById("authStatus");
    const authError = document.getElementById("authError");

    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const signInBtn = document.getElementById("signInBtn");
    const createAccountBtn = document.getElementById("createAccountBtn");
    const signOutBtn = document.getElementById("signOutBtn");

    const itemNameInput = document.getElementById("itemNameInput");
    const itemPriceInput = document.getElementById("itemPriceInput");
    const itemStoreInput = document.getElementById("itemStoreInput");
    const quickAddBtn = document.getElementById("quickAddBtn");
    const bottomAddBtn = document.getElementById("bottomAddBtn");

    const needList = document.getElementById("needList");
    const gotList = document.getElementById("gotList");
    const savedList = document.getElementById("savedList");
    const savedWrap = document.getElementById("savedWrap");
    const toggleSavedBtn = document.getElementById("toggleSavedBtn");
    const savedCount = document.getElementById("savedCount");
    const pickedTotal = document.getElementById("pickedTotal");

    let unsubscribeItems = null;
    let currentUser = null;
    let currentItems = [];

    function showError(message) {
      authError.textContent = message;
      authError.style.display = "block";
    }

    function clearError() {
      authError.textContent = "";
      authError.style.display = "none";
    }

    function setAuthLoading(loading) {
      signInBtn.disabled = loading;
      createAccountBtn.disabled = loading;
      signInBtn.textContent = loading ? "Please wait..." : "Sign In";
      createAccountBtn.textContent = loading ? "Please wait..." : "Create Account";
    }

    function parsePriceNumber(priceText) {
      if (!priceText) return 0;
      const cleaned = String(priceText).trim();

      const saleMatch = cleaned.match(/^(\d+(\.\d+)?)\s*\/\s*(\d+(\.\d+)?)$/);
      if (saleMatch) {
        const total = parseFloat(saleMatch[1]);
        return isNaN(total) ? 0 : total;
      }

      const numberMatch = cleaned.match(/(\d+(\.\d+)?)/);
      if (!numberMatch) return 0;

      const value = parseFloat(numberMatch[1]);
      return isNaN(value) ? 0 : value;
    }

    function money(value) {
      return `$${value.toFixed(2)}`;
    }

    async function handleSignIn() {
      clearError();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        showError("Enter email and password.");
        return;
      }

      try {
        setAuthLoading(true);
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        showError(err.message);
        console.error(err);
      } finally {
        setAuthLoading(false);
      }
    }

    async function handleCreateAccount() {
      clearError();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        showError("Enter email and password.");
        return;
      }

      if (password.length < 6) {
        showError("Password should be at least 6 characters.");
        return;
      }

      try {
        setAuthLoading(true);
        await createUserWithEmailAndPassword(auth, email, password);
      } catch (err) {
        showError(err.message);
        console.error(err);
      } finally {
        setAuthLoading(false);
      }
    }

    async function handleSignOut() {
      try {
        await signOut(auth);
      } catch (err) {
        alert(err.message);
        console.error(err);
      }
    }

    function renderItems() {
      needList.innerHTML = "";
      gotList.innerHTML = "";
      savedList.innerHTML = "";

      const need = currentItems.filter(i => i.status === "need");
      const got = currentItems.filter(i => i.status === "got");
      const saved = currentItems.filter(i => i.status === "saved");

      if (!need.length) {
        needList.innerHTML = `<div class="empty">No items in Have to Get.</div>`;
      } else {
        need.forEach(item => needList.appendChild(buildItemCard(item)));
      }

      if (!got.length) {
        gotList.innerHTML = `<div class="empty">No picked items yet.</div>`;
      } else {
        got.forEach(item => gotList.appendChild(buildItemCard(item)));
      }

      if (!saved.length) {
        savedList.innerHTML = `<div class="empty">No saved items.</div>`;
      } else {
        saved.forEach(item => savedList.appendChild(buildItemCard(item)));
      }

      savedCount.textContent = `${saved.length} item${saved.length === 1 ? "" : "s"}`;

      const total = got.reduce((sum, item) => sum + parsePriceNumber(item.price), 0);
      pickedTotal.textContent = money(total);
    }

    function buildItemCard(item) {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div class="item-top">
          <div>
            <div class="item-name">${escapeHtml(item.name || "Untitled item")}</div>
            <div class="item-meta">
              ${item.price ? `Price: ${escapeHtml(item.price)}` : "No price"}
              ${item.store ? ` • Store: ${escapeHtml(item.store)}` : ""}
            </div>
          </div>
        </div>
        <div class="item-actions">
          <button class="chip ${item.status === "need" ? "active" : ""}" data-action="need">Have to Get</button>
          <button class="chip ${item.status === "got" ? "active" : ""}" data-action="got">Got</button>
          <button class="chip ${item.status === "saved" ? "active" : ""}" data-action="saved">Saved</button>
          <button class="chip" data-action="delete">Delete</button>
        </div>
      `;

      div.querySelectorAll(".chip").forEach(btn => {
        btn.addEventListener("click", async () => {
          const action = btn.dataset.action;
          const ref = doc(db, "groceryItems", item.id);

          try {
            if (action === "delete") {
              await deleteDoc(ref);
            } else {
              await updateDoc(ref, { status: action });
            }
          } catch (err) {
            alert(err.message);
            console.error(err);
          }
        });
      });

      return div;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function handleAddItem() {
      if (!currentUser) {
        alert("Please sign in first.");
        return;
      }

      const name = itemNameInput.value.trim();
      const price = itemPriceInput.value.trim();
      const store = itemStoreInput.value.trim();

      if (!name) {
        alert("Enter an item name.");
        itemNameInput.focus();
        return;
      }

      try {
        await addDoc(collection(db, "groceryItems"), {
          name,
          price,
          store,
          status: "need",
          createdBy: currentUser.email || currentUser.uid,
          createdAt: serverTimestamp()
        });

        itemNameInput.value = "";
        itemPriceInput.value = "";
        itemStoreInput.value = "";
        itemNameInput.focus();
      } catch (err) {
        alert(err.message);
        console.error(err);
      }
    }

    function watchItems() {
      if (unsubscribeItems) unsubscribeItems();

      const q = query(collection(db, "groceryItems"), orderBy("createdAt", "desc"));
      unsubscribeItems = onSnapshot(q, (snap) => {
        currentItems = snap.docs.map(d => ({
          id: d.id,
          ...d.data()
        }));
        renderItems();
      }, (err) => {
        console.error(err);
        alert("Could not load grocery items. Check Firestore rules.");
      });
    }

    signInBtn.addEventListener("click", handleSignIn);
    createAccountBtn.addEventListener("click", handleCreateAccount);
    signOutBtn.addEventListener("click", handleSignOut);
    quickAddBtn.addEventListener("click", handleAddItem);
    bottomAddBtn.addEventListener("click", handleAddItem);

    toggleSavedBtn.addEventListener("click", () => {
      savedWrap.classList.toggle("hidden");
    });

    [emailInput, passwordInput].forEach(el => {
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleSignIn();
      });
    });

    [itemNameInput, itemPriceInput, itemStoreInput].forEach(el => {
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleAddItem();
      });
    });

    onAuthStateChanged(auth, (user) => {
      currentUser = user;

      if (user) {
        authScreen.style.display = "none";
        appShell.style.display = "block";
        bottomBar.classList.remove("hidden");
        authStatus.textContent = `Signed in as ${user.email}`;
        watchItems();
      } else {
        authScreen.style.display = "block";
        appShell.style.display = "none";
        bottomBar.classList.add("hidden");
        authStatus.textContent = "Not signed in";
        currentItems = [];
        renderItems();

        if (unsubscribeItems) {
          unsubscribeItems();
          unsubscribeItems = null;
        }
      }
    });
  </script>
</body>
</html>
